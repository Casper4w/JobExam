<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>DISC 自動化系統說明文件</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="DISC 職場行為風格測驗自動化系統">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">系統文件載入中...</div>
  
  <script>
    window.$docsify = {
      name: 'DISC 自動化系統',
      // 加入您的 GitHub 專案路徑，網頁右上角會顯示 GitHub Corner 連結
      repo: 'Casper4w/JobExam', 
      
      // 這裡拿掉 homepage 的強制設定，讓系統自動抓取根目錄的 README.md
      loadSidebar: false,
      
      // 自動根據 Markdown 的 H2 (##), H3 (###) 產生右側目錄，方便閱讀
      subMaxLevel: 2 
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
